<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement Corner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html,body{width:100%;height:100%;background:transparent;overflow-x:hidden;}
.container{max-width:1200px;margin:auto;padding:40px 20px 80px;}
h1{text-align:center;margin-bottom:40px;font-size:42px;font-weight:700;letter-spacing:2px;color:#fff;text-shadow:0 0 6px rgba(255,255,255,.7),0 0 12px rgba(80,180,255,.8);}
.grid{display:grid;grid-template-columns:repeat(2,220px);justify-content:center;gap:50px 90px;}
.card:nth-child(1){grid-column:1/span 2;justify-self:center;}
.card:nth-child(2){justify-self:end;}
.card:nth-child(3){justify-self:start;}
.card{width:220px;text-align:center;}

.mainBtn{
position:relative;
width:220px;
height:220px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
margin:0 auto;
cursor:pointer;
overflow:hidden;
border-radius:50%;
border:10px solid transparent;
background:
radial-gradient(circle at 50% 30%,#dff7ff 0%,#7fd8ff 15%,#38a4ff 35%,#1567d8 55%,#0b3f9d 72%,#07296b 100%) padding-box,
linear-gradient(135deg,#f8f9fa 0%,#d9dde1 8%,#b9c0c7 18%,#8b939b 30%,#6d747c 42%,#d5d9de 55%,#f2f3f5 68%,#9aa2aa 82%,#6a7178 92%,#50575f 100%) border-box;
color:#fff;
font-size:24px;
font-weight:700;
letter-spacing:1px;
text-shadow:0 1px 2px #000,0 0 10px rgba(255,255,255,.8);
box-shadow:0 12px 18px rgba(0,0,0,.55),0 0 18px rgba(70,170,255,.8),inset 0 8px 18px rgba(255,255,255,.45),inset 0 -12px 16px rgba(0,0,0,.45);
transition:.35s;
}
.mainBtn:hover{transform:translateY(-4px);box-shadow:0 12px 22px rgba(0,0,0,.6),0 0 30px rgba(0,180,255,.9),0 0 60px rgba(0,120,255,.5);}
.mainBtn::after{content:"";position:absolute;left:50%;top:50%;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.45);transform:translate(-50%,-50%) scale(0);animation:ripple 2.5s infinite;}
@keyframes ripple{
0%{transform:translate(-50%,-50%) scale(0);opacity:.8;}
70%{transform:translate(-50%,-50%) scale(22);opacity:0;}
100%{opacity:0;}
}
.subMenu{display:none;padding-top:18px;}
.subMenu.active{display:block;animation:fade .35s;}
@keyframes fade{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.folder{display:block;position:relative;margin-bottom:16px;padding:22px 15px 15px;text-decoration:none;font-weight:600;color:#fff;text-align:center;border-radius:8px;background:linear-gradient(135deg,#5d0a00,#9d2100 10%,#d04000 20%,#f1a300 35%,#ffe75a 50%,#f5b000 60%,#b62f00 75%,#7d1200 90%,#4d0600);box-shadow:0 4px 12px rgba(0,0,0,.35),inset 0 1px 2px rgba(255,255,255,.7);transition:.3s;}
.folder:before{content:"";position:absolute;top:-8px;left:18px;width:70px;height:18px;border-radius:6px 6px 0 0;background:linear-gradient(90deg,#f8ea74,#c67a00,#ffef8a);}
.folder:hover{transform:translateX(6px);box-shadow:0 0 18px gold;}
footer{position:fixed;bottom:10px;left:0;width:100%;text-align:center;font-size:13px;color:#fff;text-shadow:0 0 4px #000;}
@media(max-width:950px){.grid{display:flex;flex-direction:column;align-items:center;}.card{width:100%;max-width:420px;}}
</style>
</head>
<body>
<div class="container">
<h1>PROCUREMENT CORNER</h1>
<div class="grid">
<div class="card"><button class="mainBtn">Monitoring Dashboard</button><div class="subMenu">
<a class="folder" href="#">Repository 1</a><a class="folder" href="#">Repository 2</a><a class="folder" href="#">Repository 3</a><a class="folder" href="#">Repository 4</a><a class="folder" href="#">Repository 5</a></div></div>
<div class="card"><button class="mainBtn">MOVs Repository (KKB-CDD)</button><div class="subMenu">
<a class="folder" href="#">Invitation to Bid</a><a class="folder" href="#">BAC Documents</a><a class="folder" href="#">Notice of Award</a></div></div>
<div class="card"><button class="mainBtn">MOVs Repository (PCRP)</button><div class="subMenu">
<a class="folder" href="#">Program of Work</a><a class="folder" href="#">Cost Estimates</a><a class="folder" href="#">As-Built Plans</a></div></div>
</div></div>
<footer>© 2026 Ghilous. All Rights Reserved.</footer>
<script>
document.querySelectorAll(".mainBtn").forEach(btn=>btn.onclick=()=>btn.nextElementSibling.classList.toggle("active"));
</script>
</body></html>
